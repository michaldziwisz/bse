name: ios-ipa

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/BSE
        run: xcodegen generate

      - name: Archive unsigned app
        working-directory: ios/BSE
        run: |
          set -euxo pipefail
          xcodebuild \
            -project BSE.xcodeproj \
            -scheme BSE \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/BSE.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package IPA
        working-directory: ios/BSE
        run: |
          set -euxo pipefail
          mkdir -p build/Payload
          cp -R build/BSE.xcarchive/Products/Applications/BSE.app build/Payload/BSE.app
          cd build
          /usr/bin/zip -r BSE.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BSE-ipa
          path: ios/BSE/build/BSE.ipa
          if-no-files-found: error
