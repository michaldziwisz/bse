name: BSE
options:
  bundleIdPrefix: eu.blueseaeye
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: BSE
    PRODUCT_BUNDLE_IDENTIFIER: eu.blueseaeye.bse
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_ASSET_PATHS: ""
    SUPPORTS_MACCATALYST: NO
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: BSE/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
targets:
  BSE:
    type: application
    platform: iOS
    sources:
      - path: BSE
    resources:
      - path: BSE/Resources
    settings:
      base:
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO
        PRODUCT_NAME: BSE
    scheme:
      gatherCoverageData: false
